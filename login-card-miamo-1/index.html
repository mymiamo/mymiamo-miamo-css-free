<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Card Miamo #1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="logo.png" draggable="false" alt="Logo">
            <span>Sign In</span>
        </div>
        <div class="input-group">
            <label for="username-or-email">Username or E-mail</label>
            <input type="text">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password">
        </div>
       <div class="login-col">
        <label class="rm-checkbox">
            Remember Me <input type="checkbox" name="">
            
        </label>
        <a href="#" class="forgot">Forgot password?</a>
       </div>

        <div class="input-group">
            <button class="submit">Sign In</button>
        </div>
    </div>
</body>
</html>
